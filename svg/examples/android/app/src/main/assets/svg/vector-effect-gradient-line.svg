<svg width="560" height="180" viewBox="0 0 560 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lineGradient" x1="0" y1="0" x2="180" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e88e5" />
      <stop offset="50%" stop-color="#8e24aa" />
      <stop offset="100%" stop-color="#ef6c00" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="560" height="180" fill="#f5f5f5" />

  <g transform="translate(24 24)">
    <text x="0" y="0" font-size="18" fill="#424242">gradient line none</text>
    <rect x="0" y="18" width="230" height="110" rx="10" ry="10" fill="#fafafa" stroke="#bdbdbd" stroke-dasharray="6 6" />
    <g transform="translate(24 56) scale(4.2)">
      <path d="M0 0 L42 0" fill="none" stroke="url(#lineGradient)" stroke-width="5" stroke-linecap="round" />
    </g>

    <text x="278" y="0" font-size="18" fill="#424242">gradient line non-scaling</text>
    <rect x="278" y="18" width="230" height="110" rx="10" ry="10" fill="#fafafa" stroke="#bdbdbd" stroke-dasharray="6 6" />
    <g transform="translate(302 56) scale(4.2)">
      <path d="M0 0 L42 0" fill="none" stroke="url(#lineGradient)" stroke-width="5"
            stroke-linecap="round" vector-effect="non-scaling-stroke" />
    </g>
  </g>
</svg>
