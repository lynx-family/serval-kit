<svg width="900" height="700" viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg">
  <style>text { font-family: sans-serif; font-size: 13px; fill: #333; }</style>
  <rect width="900" height="700" fill="#f0f0f0"/>
  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="bold">mask-type="luminance" Test Cases</text>

  <defs>
    <!-- 1. White = fully visible -->
    <mask id="l1" mask-type="luminance">
      <rect width="160" height="160" fill="white"/>
    </mask>

    <!-- 2. Black = fully hidden -->
    <mask id="l2" mask-type="luminance">
      <rect width="160" height="160" fill="black"/>
    </mask>

    <!-- 3. Gray = partial (luma ~0.5) -->
    <mask id="l3" mask-type="luminance">
      <rect width="160" height="160" fill="#808080"/>
    </mask>

    <!-- 4. Color luminance: red vs green vs blue have different luma
         R: 0.2126, G: 0.7152, B: 0.0722 -->
    <mask id="l4" mask-type="luminance">
      <rect x="0" y="0" width="54" height="160" fill="red"/>
      <rect x="54" y="0" width="52" height="160" fill="lime"/>
      <rect x="106" y="0" width="54" height="160" fill="blue"/>
    </mask>

    <!-- 5. Linear gradient luminance (black→white) -->
    <linearGradient id="lumaGradLR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="black"/>
      <stop offset="100%" stop-color="white"/>
    </linearGradient>
    <mask id="l5" mask-type="luminance">
      <rect width="160" height="160" fill="url(#lumaGradLR)"/>
    </mask>

    <!-- 6. Radial gradient luminance -->
    <radialGradient id="lumaRadial" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="black"/>
    </radialGradient>
    <mask id="l6" mask-type="luminance">
      <rect width="160" height="160" fill="url(#lumaRadial)"/>
    </mask>

    <!-- 7. Shape with white fill on black bg -->
    <mask id="l7" mask-type="luminance">
      <rect width="160" height="160" fill="black"/>
      <circle cx="80" cy="80" r="60" fill="white"/>
    </mask>

    <!-- 8. Donut: white ring on black -->
    <mask id="l8" mask-type="luminance">
      <rect width="160" height="160" fill="black"/>
      <circle cx="80" cy="80" r="65" fill="white"/>
      <circle cx="80" cy="80" r="35" fill="black"/>
    </mask>

    <!-- 9. Stroke-only luminance -->
    <mask id="l9" mask-type="luminance">
      <rect width="160" height="160" fill="black"/>
      <circle cx="80" cy="80" r="55" fill="none" stroke="white" stroke-width="18"/>
    </mask>

    <!-- 10. Star path luminance -->
    <mask id="l10" mask-type="luminance">
      <rect width="160" height="160" fill="black"/>
      <path d="M80,10 L98,60 L150,60 L108,92 L122,145 L80,115 L38,145 L52,92 L10,60 L62,60 Z" fill="white"/>
    </mask>

    <!-- 11. Multi-gray bands (stepped grayscale) -->
    <mask id="l11" mask-type="luminance">
      <rect x="0" y="0" width="32" height="160" fill="#000"/>
      <rect x="32" y="0" width="32" height="160" fill="#333"/>
      <rect x="64" y="0" width="32" height="160" fill="#666"/>
      <rect x="96" y="0" width="32" height="160" fill="#999"/>
      <rect x="128" y="0" width="32" height="160" fill="#fff"/>
    </mask>

    <!-- 12. Luminance with alpha interaction (white at 50% alpha) -->
    <mask id="l12" mask-type="luminance">
      <rect width="160" height="80" fill="white" fill-opacity="1"/>
      <rect y="80" width="160" height="80" fill="white" fill-opacity="0.5"/>
    </mask>
  </defs>

  <!-- Row 1 -->
  <g transform="translate(30,60)">
    <text x="80" y="-5" text-anchor="middle">1. White=Visible</text>
    <rect width="160" height="160" fill="#e0e0e0"/>
    <rect width="160" height="160" rx="12" fill="#246bff" mask="url(#l1)"/>
  </g>
  <g transform="translate(220,60)">
    <text x="80" y="-5" text-anchor="middle">2. Black=Hidden</text>
    <rect width="160" height="160" fill="#e0e0e0"/>
    <rect width="160" height="160" rx="12" fill="#246bff" mask="url(#l2)"/>
  </g>
  <g transform="translate(410,60)">
    <text x="80" y="-5" text-anchor="middle">3. Gray=Partial</text>
    <rect width="160" height="160" fill="#e0e0e0"/>
    <rect width="160" height="160" rx="12" fill="#246bff" mask="url(#l3)"/>
  </g>
  <g transform="translate(600,60)">
    <text x="80" y="-5" text-anchor="middle">4. R|G|B Luma</text>
    <rect width="160" height="160" fill="#e0e0e0"/>
    <rect width="160" height="160" rx="12" fill="#246bff" mask="url(#l4)"/>
  </g>

  <!-- Row 2 -->
  <g transform="translate(30,270)">
    <text x="80" y="-5" text-anchor="middle">5. Linear Grad Luma</text>
    <rect width="160" height="160" fill="#e0e0e0"/>
    <rect width="160" height="160" rx="12" fill="#12b886" mask="url(#l5)"/>
  </g>
  <g transform="translate(220,270)">
    <text x="80" y="-5" text-anchor="middle">6. Radial Grad Luma</text>
    <rect width="160" height="160" fill="#e0e0e0"/>
    <rect width="160" height="160" rx="12" fill="#12b886" mask="url(#l6)"/>
  </g>
  <g transform="translate(410,270)">
    <text x="80" y="-5" text-anchor="middle">7. Circle on Black</text>
    <rect width="160" height="160" fill="#e0e0e0"/>
    <rect width="160" height="160" rx="12" fill="#12b886" mask="url(#l7)"/>
  </g>
  <g transform="translate(600,270)">
    <text x="80" y="-5" text-anchor="middle">8. Donut Ring</text>
    <rect width="160" height="160" fill="#e0e0e0"/>
    <rect width="160" height="160" rx="12" fill="#12b886" mask="url(#l8)"/>
  </g>

  <!-- Row 3 -->
  <g transform="translate(30,480)">
    <text x="80" y="-5" text-anchor="middle">9. Stroke Only</text>
    <rect width="160" height="160" fill="#e0e0e0"/>
    <rect width="160" height="160" rx="12" fill="#f76707" mask="url(#l9)"/>
  </g>
  <g transform="translate(220,480)">
    <text x="80" y="-5" text-anchor="middle">10. Star Path</text>
    <rect width="160" height="160" fill="#e0e0e0"/>
    <rect width="160" height="160" rx="12" fill="#f76707" mask="url(#l10)"/>
  </g>
  <g transform="translate(410,480)">
    <text x="80" y="-5" text-anchor="middle">11. Gray Steps</text>
    <rect width="160" height="160" fill="#e0e0e0"/>
    <rect width="160" height="160" rx="12" fill="#f76707" mask="url(#l11)"/>
  </g>
  <g transform="translate(600,480)">
    <text x="80" y="-5" text-anchor="middle">12. Luma×Alpha</text>
    <rect width="160" height="160" fill="#e0e0e0"/>
    <rect width="160" height="160" rx="12" fill="#f76707" mask="url(#l12)"/>
  </g>
</svg>
