<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="linearX2" x1="0" y1="0" y2="0">
      <stop offset="0" stop-color="#071423"/>
      <stop offset="1" stop-color="#ffffff"/>
      <animate attributeName="x2" values="1;0.2;1" dur="2s"
               repeatCount="indefinite"/>
    </linearGradient>

    <radialGradient id="radialR" cx="0.5" cy="0.5">
      <stop offset="0" stop-color="#80ffdb"/>
      <stop offset="1" stop-color="#071423"/>
      <animate attributeName="r" values="0.25;0.75;0.25" dur="2s"
               repeatCount="indefinite"/>
    </radialGradient>

    <linearGradient id="transformGradient" gradientUnits="userSpaceOnUse"
                    x1="24" y1="0" x2="152" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#071423"/>
      <animateTransform attributeName="gradientTransform" type="translate"
                        values="0 0;-80 0;0 0" dur="2s"
                        repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <rect width="320" height="180" fill="#071423"/>

  <rect x="24" y="20" width="128" height="34" rx="4" fill="url(#linearX2)"/>
  <rect x="176" y="72" width="120" height="42" rx="4" fill="url(#radialR)"/>
  <rect x="24" y="126" width="128" height="34" rx="4"
        fill="url(#transformGradient)"/>
</svg>
