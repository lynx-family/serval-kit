<svg width="660" height="220" viewBox="0 0 660 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <mask id="zeroWidthUser" mask-type="alpha" maskUnits="userSpaceOnUse" x="40" y="40" width="0" height="120">
      <rect x="0" y="0" width="660" height="220" fill="white"/>
    </mask>
    <mask id="negativeWidthUser" mask-type="alpha" maskUnits="userSpaceOnUse" x="250" y="40" width="-20" height="120">
      <rect x="0" y="0" width="660" height="220" fill="white"/>
