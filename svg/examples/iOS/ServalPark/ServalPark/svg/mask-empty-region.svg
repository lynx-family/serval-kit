  </defs>

  <rect width="660" height="220" fill="white"/>

  <rect x="20" y="20" width="160" height="160" fill="#2563eb" mask="url(#zeroWidthUser)"/>
  <rect x="20" y="20" width="160" height="160" fill="none" stroke="#222" stroke-width="2"/>

  <rect x="250" y="20" width="160" height="160" fill="#16a34a" mask="url(#negativeWidthUser)"/>
  <rect x="250" y="20" width="160" height="160" fill="none" stroke="#222" stroke-width="2"/>

  <rect x="480" y="20" width="160" height="160" fill="#f97316" mask="url(#zeroWidthOBB)"/>
  <rect x="480" y="20" width="160" height="160" fill="none" stroke="#222" stroke-width="2"/>
</svg>
