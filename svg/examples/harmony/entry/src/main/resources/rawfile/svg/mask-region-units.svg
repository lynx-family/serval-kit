<svg width="660" height="220" viewBox="0 0 660 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <mask id="userRegion" mask-type="alpha" maskUnits="userSpaceOnUse" x="50" y="48" width="80" height="88">
      <rect x="0" y="0" width="660" height="220" fill="white"/>
    </mask>
    <mask id="obbNumericRegion" mask-type="alpha" maskUnits="objectBoundingBox" x="0.25" y="0.25" width="0.5" height="0.5">
      <rect x="0" y="0" width="1" height="1" fill="white"/>
    </mask>
    <mask id="obbPercentRegion" mask-type="alpha" maskUnits="objectBoundingBox" x="25%" y="25%" width="50%" height="50%">
      <rect x="0" y="0" width="1" height="1" fill="white"/>
    </mask>
  </defs>

  <rect width="660" height="220" fill="#f6f6f6"/>

  <g transform="translate(20 20)">
    <rect x="0" y="0" width="160" height="160" fill="#e5e7eb"/>
    <rect x="0" y="0" width="160" height="160" fill="#2563eb" mask="url(#userRegion)"/>
    <rect x="0" y="0" width="160" height="160" fill="none" stroke="#222" stroke-width="2"/>
    <rect x="30" y="28" width="80" height="88" fill="none" stroke="#ef4444" stroke-width="2"/>
  </g>

  <g transform="translate(250 20)">
    <rect x="0" y="0" width="160" height="160" fill="#e5e7eb"/>
    <rect x="0" y="0" width="160" height="160" fill="#16a34a" mask="url(#obbNumericRegion)"/>
    <rect x="0" y="0" width="160" height="160" fill="none" stroke="#222" stroke-width="2"/>
    <rect x="40" y="40" width="80" height="80" fill="none" stroke="#ef4444" stroke-width="2"/>
  </g>

  <g transform="translate(480 20)">
    <rect x="0" y="0" width="160" height="160" fill="#e5e7eb"/>
    <rect x="0" y="0" width="160" height="160" fill="#f97316" mask="url(#obbPercentRegion)"/>
    <rect x="0" y="0" width="160" height="160" fill="none" stroke="#222" stroke-width="2"/>
    <rect x="40" y="40" width="80" height="80" fill="none" stroke="#ef4444" stroke-width="2"/>
  </g>
</svg>
