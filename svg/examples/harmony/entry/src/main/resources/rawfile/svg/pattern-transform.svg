<svg width="240" height="120" viewBox="0 0 240 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="plainPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="20" height="20" fill="#f3e5f5" />
      <rect x="0" y="0" width="10" height="10" fill="#8e24aa" />
    </pattern>

    <pattern id="rotatedPattern" href="#plainPattern" patternTransform="rotate(30) scale(1.2)" />
  </defs>

  <rect x="0" y="0" width="120" height="120" fill="url(#plainPattern)" />
  <rect x="120" y="0" width="120" height="120" fill="url(#rotatedPattern)" />
</svg>
