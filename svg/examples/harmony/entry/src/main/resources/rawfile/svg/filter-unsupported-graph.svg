<svg width="660" height="240" viewBox="0 0 660 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="floodCompositeGraph" filterUnits="userSpaceOnUse" x="20" y="30" width="180" height="160">
      <feFlood flood-color="#ef4444" flood-opacity="1" result="flood"/>
      <feComposite in="flood" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="blendGraph" filterUnits="userSpaceOnUse" x="250" y="30" width="180" height="160">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="multiply"/>
    </filter>
    <filter id="primitiveSubregionGraph" filterUnits="userSpaceOnUse" x="480" y="30" width="160" height="160">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" x="510" y="60" width="80" height="80"/>
    </filter>
  </defs>

  <rect width="660" height="240" fill="#f6f6f6"/>

  <g transform="translate(20 40)">
    <rect x="0" y="0" width="160" height="140" fill="#e5e7eb"/>
    <rect x="24" y="22" width="112" height="96" rx="14" fill="#2563eb" filter="url(#floodCompositeGraph)"/>
    <rect x="0" y="0" width="160" height="140" fill="none" stroke="#222" stroke-width="2"/>
  </g>

  <g transform="translate(250 40)">
    <rect x="0" y="0" width="160" height="140" fill="#e5e7eb"/>
    <circle cx="80" cy="70" r="52" fill="#16a34a" filter="url(#blendGraph)"/>
    <rect x="0" y="0" width="160" height="140" fill="none" stroke="#222" stroke-width="2"/>
  </g>

  <g transform="translate(480 40)">
    <rect x="0" y="0" width="160" height="140" fill="#e5e7eb"/>
    <rect x="20" y="20" width="120" height="100" rx="14" fill="#f97316" filter="url(#primitiveSubregionGraph)"/>
    <rect x="0" y="0" width="160" height="140" fill="none" stroke="#222" stroke-width="2"/>
    <rect x="30" y="20" width="80" height="80" fill="none" stroke="#ef4444" stroke-width="2"/>
  </g>
</svg>
