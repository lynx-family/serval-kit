name: markdown ios release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "release tag"
        required: false
        type: string

jobs:
  get-version:
    runs-on: lynx-ubuntu-22.04-medium
    timeout-minutes: 60
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Get Version
        id: get_version
        shell: bash
        run: |-
          if [ ${{ github.event_name }} == 'workflow_dispatch' ]; then
            version=${{ github.event.inputs.tag }}
          else
            version=$(echo ${{ github.ref }} | awk -F "/" '{print $3}')
          fi
          if [[ $version =~ ^[0-9]+\.[0-9]+\.[0-9]+$ || \
                $version =~ ^[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ || \
                $version =~ ^[0-9]+\.[0-9]+\.[0-9]+-alpha\.[0-9]+$ ]]; then
            echo "Version is valid"
            echo "VERSION=$version" >> $GITHUB_OUTPUT;
          else
            echo "Version is invalid"
            exit 1
          fi

  release-ios:
    name: Release iOS
    needs: get-version
    runs-on: lynx-darwin-14-medium
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Sync Common Dependencies
        uses: ./.github/actions/sync-deps

      - name: Install Cocoapods Generate
        run: |
          export SDKROOT=/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk
          bundle install --path .bundle
      - name: Publish to CocoaPods Repo
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.REPO_SERVAL_KIT_COCOAPODS_TRUNK_TOKEN }}
          POD_VERSION: ${{ needs.get-version.outputs.version }}
          SERVAL_KIT_COMMIT_ID: ${{ github.sha }}
        run: |-
          export LANG=en_US.UTF-8
          bundle exec pod repo add-cdn trunk https://cdn.cocoapods.org/
          COCOAPODS_TRUNK_TOKEN=$COCOAPODS_TRUNK_TOKEN  POD_VERSION=$POD_VERSION SERVAL_KIT_COMMIT_ID=$SERVAL_KIT_COMMIT_ID bundle exec pod trunk push ServalMarkdown.podspec --skip-import-validation --allow-warnings --verbose

      - name: Prepare iOS Artifact For GitHub Release
        if: ${{ github.event_name != 'workflow_dispatch' }}
        shell: bash
        run: |
          VERSION="${{ needs.get-version.outputs.version }}"
          ASSET_DIR="github-release-assets/ios"
          mkdir -p "$ASSET_DIR"
          cp ServalMarkdown.podspec "$ASSET_DIR/ServalMarkdown-${VERSION}.podspec"

      - name: Upload iOS Artifact to GitHub Release
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.get-version.outputs.version }}
          files: |
            github-release-assets/ios/ServalMarkdown-${{ needs.get-version.outputs.version }}.podspec
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
