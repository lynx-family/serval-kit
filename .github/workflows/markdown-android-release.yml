name: markdown android release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "release tag"
        required: false
        type: string

jobs:
  get-version:
    runs-on: lynx-ubuntu-22.04-medium
    timeout-minutes: 60
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Get Version
        id: get_version
        shell: bash
        run: |-
          if [ ${{ github.event_name }} == 'workflow_dispatch' ]; then
            version=${{ github.event.inputs.tag }}
          else
            version=$(echo ${{ github.ref }} | awk -F "/" '{print $3}')
          fi
          if [[ $version =~ ^[0-9]+\.[0-9]+\.[0-9]+$ || \
                $version =~ ^[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ || \
                $version =~ ^[0-9]+\.[0-9]+\.[0-9]+-alpha\.[0-9]+$ ]]; then
            echo "Version is valid"
            echo "VERSION=$version" >> $GITHUB_OUTPUT;
          else
            echo "Version is invalid"
            exit 1
          fi

  release-android:
    name: Release Android
    needs: get-version
    runs-on: lynx-ubuntu-22.04-large
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Setup Java SDK
        uses: actions/setup-java@v3
        with:
          java-version: 11
          distribution: "zulu"
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 9862592

      - name: Install CMake
        run: echo "y" | sdkmanager --install "cmake;3.18.1"

      - name: Sync Common Dependencies
        uses: ./.github/actions/sync-deps

      - name: Build AAR
        working-directory: markdown/example/android
        run: |
          chmod +x gradlew
          ./gradlew :serval_markdown:assembleRelease
          ./gradlew :serval_markdown:publish \
          -Pversion=${{ needs.get-version.outputs.version }} \
          -Psigning.keyId=${{ secrets.SIGNING_KEY_ID }} \
          -Psigning.password=${{ secrets.SIGNING_PASSWORD }} \
          -Psigning.secretKey=${{ secrets.SIGNING_SECRET_KEY }}
          ./gradlew :serval_markdown:zipArtifacts :serval_markdown:getArtifactList \
          -Pversion=${{ needs.get-version.outputs.version }}
          pushd ../../platform/android/serval_markdown/build/
          artifact_list=$(<artifact-list)
          echo "artifact_list=$artifact_list" >> $GITHUB_OUTPUT;
          popd
        id: build_artifact

      - name: Publish artifact to maven
        uses: lynx-infra/maven-publish-action@8f547cf037360752cc9f195d04c2d8f327fee434
        with:
          portal_api_token: ${{ secrets.PORTAL_API_TOKEN }}
          artifact_path_list: ${{ steps.build_artifact.outputs.artifact_list }}

      - name: Prepare Android Artifact For GitHub Release
        if: ${{ github.event_name != 'workflow_dispatch' }}
        shell: bash
        run: |
          VERSION="${{ needs.get-version.outputs.version }}"
          ASSET_DIR="github-release-assets/android"
          mkdir -p "$ASSET_DIR"
          AAR_PATH=$(find markdown/platform/android/serval_markdown/build/outputs/aar -name "*release*.aar" | head -n 1)
          if [ -z "$AAR_PATH" ]; then
            echo "No release aar found."
            exit 1
          fi
          cp "$AAR_PATH" "$ASSET_DIR/serval_markdown-android-${VERSION}.aar"
          ZIP_PATH=$(find markdown/platform/android/serval_markdown/build -maxdepth 1 -name "*.zip" | head -n 1)
          if [ -n "$ZIP_PATH" ]; then
            cp "$ZIP_PATH" "$ASSET_DIR/$(basename "$ZIP_PATH")"
          fi

      - name: Upload Android Artifact to GitHub Release
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.get-version.outputs.version }}
          files: |
            github-release-assets/android/serval_markdown-android-${{ needs.get-version.outputs.version }}.aar
            github-release-assets/android/*.zip
          fail_on_unmatched_files: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
